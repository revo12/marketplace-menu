<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div class="window">
      <div class="window__header">
        <div class="window__title">Marketplace Menu</div>

        <div class="window__actions">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Поиск по названию или ID..."
          />
          <button id="refreshButton" class="action-button">Обновить</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab tab--active" data-tab="favorites">Избраное</button>
        <button class="tab" data-tab="library">Библиотека</button>
      </div>

      <div class="content">
        <div id="statusBar" class="status-bar">Загрузка...</div>

        <div class="workspace">
          <div class="workspace__main">
            <div id="favoritesView" class="view view--active">
              <div id="favoritesGrid" class="items-grid"></div>
              <div id="favoritesEmpty" class="empty-state">В избраном пока нет предметов</div>
            </div>

            <div id="libraryView" class="view">
              <div id="libraryGrid" class="items-grid"></div>
              <div id="libraryEmpty" class="empty-state">Каталог пуст</div>
            </div>
          </div>

          <aside class="workspace__logs">
            <div class="logs__header">
              <div class="logs__title">Логи</div>
              <button id="clearLogsButton" class="logs__clear">Очистить</button>
            </div>
            <div id="logsPanel" class="logs__body"></div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
